# lychee link checker config — https://lychee.cli.rs/
max_concurrency = 16
max_redirects = 5
timeout = 20
retry_wait_time = 2

accept = [200, 203, 206, 429]

exclude_path = [
  "_site",
  ".quarto",
  "_freeze",
  "bibliography/publications",
]

# Many of these block bots or rate-limit aggressively; skip to reduce false positives.
exclude = [
  "^https?://(www\\.)?linkedin\\.com/",
  "^https?://(www\\.)?x\\.com/",
  "^https?://(www\\.)?twitter\\.com/",
  "^https?://scholar\\.google\\.com/",
  "^https?://doi\\.org/",
  "^mailto:",
]
